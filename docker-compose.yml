name: life-os-frontend-dev

services:
    node:
        build:
            context: .
            dockerfile: docker/dev/Dockerfile
            target: node
        ports:
            - "5173:5173"
        volumes:
            - ./:/app
            - node_modules:/app/node_modules
        environment:
            CHOKIDAR_USEPOLLING: "true"

volumes:
    node_modules:
